<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoSplice - AI Forgery Detection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Animated Background */
        .bg-animated {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
        }
        
        .bg-animated::before,
        .bg-animated::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: float 20s infinite ease-in-out;
        }
        
        .bg-animated::before {
            background: rgba(99, 102, 241, 0.4);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }
        
        .bg-animated::after {
            background: rgba(236, 72, 153, 0.4);
            bottom: -100px;
            right: -100px;
            animation-delay: 10s;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -50px) scale(1.1); }
            66% { transform: translate(-50px, 50px) scale(0.9); }
        }
        
        /* Glassmorphism Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border-radius: 24px;
            position: relative;
            z-index: 1;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.15);
        }
        
        /* Upload Area with Gradient Border */
        .upload-area {
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.08);
            border: 2px dashed rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            overflow: hidden;
        }
        
        .upload-area::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #667eea, #764ba2, #f093fb);
            border-radius: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }
        
        .upload-area:hover::before,
        .upload-area.dragover::before {
            opacity: 1;
        }
        
        .upload-area:hover,
        .upload-area.dragover {
            background: rgba(255, 255, 255, 0.15);
            border-color: transparent;
            transform: scale(1.02);
        }
        
        .upload-icon {
            transition: transform 0.3s ease;
        }
        
        .upload-area:hover .upload-icon {
            transform: translateY(-5px) scale(1.1);
        }
        
        /* Button Gradient Animation */
        .btn-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            overflow: hidden;
            transition: transform 0.2s ease;
        }
        
        .btn-gradient::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }
        
        .btn-gradient:hover::before {
            left: 100%;
        }
        
        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .btn-gradient:active {
            transform: translateY(0);
        }
        
        /* Loading Animation */
        .loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .loading-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: white;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        
        .loading-dot:nth-child(1) { animation-delay: -0.32s; }
        .loading-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        /* Preview Image */
        #preview {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: scale(0);
            opacity: 0;
        }
        
        #preview.show {
            transform: scale(1);
            opacity: 1;
        }
        
        /* Select Dropdown */
        select {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        select:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        select option {
            background: #667eea;
            color: white;
        }
        
        /* Text Glow Effect */
        .text-glow {
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5),
                         0 0 40px rgba(255, 255, 255, 0.3);
        }
        
        /* Pulse Animation for Icons */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        .pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body>
    <div class="bg-animated"></div>
    
    <div class="relative z-10 flex flex-col items-center min-h-screen p-6 py-12">
        <!-- Header -->
        <div class="text-center mb-12 animate-fade-in">
            <h1 class="text-5xl md:text-6xl font-extrabold text-white mb-4 text-glow" style="font-family: 'Space Grotesk', sans-serif;">
                🔬 AutoSplice
            </h1>
            <p class="text-xl md:text-2xl text-white/90 font-semibold">
                AI-Powered Image Forgery Detection
            </p>
            <p class="text-sm text-white/70 mt-2">
                Advanced forensic analysis powered by deep learning
            </p>
        </div>

        <!-- Main Card -->
        <div class="glass-card w-full max-w-2xl p-8 md:p-10">
            {% if error %}
                <div class="bg-red-500/20 border border-red-400/50 rounded-xl p-4 mb-6 backdrop-blur-sm">
                    <p class="text-red-100 font-semibold">⚠️ {{ error }}</p>
                </div>
            {% endif %}

            <form id="uploadForm" method="post" enctype="multipart/form-data" class="space-y-6">
                <!-- Upload Area -->
                <div id="uploadArea" class="upload-area p-10 md:p-12">
                    <div class="flex flex-col items-center text-center">
                        <div class="upload-icon mb-4 pulse">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                            </svg>
                        </div>
                        <h3 class="text-2xl font-bold text-white mb-2">
                            Drop your image here
                        </h3>
                        <p class="text-white/70 mb-1">or click to browse</p>
                        <p class="text-xs text-white/50">Supports PNG, JPG, JPEG</p>
                        <input type="file" name="image" id="fileInput" class="hidden" accept="image/*">
                    </div>
                </div>

                <!-- Pipeline Mode Selector -->
                <div class="space-y-2">
                    <label for="mode" class="block text-white font-semibold text-lg">
                        🔍 Analysis Pipeline
                    </label>
                    <select name="mode" id="mode" class="w-full p-3 rounded-xl font-medium text-base focus:outline-none focus:ring-2 focus:ring-white/50">
                        <option value="dis25k">DIS25k - Standard Detection</option>
                        <option value="autosplice">AutoSplice - Basic Analysis</option>
                        <option value="both">Both - Comprehensive Scan</option>
                    </select>
                </div>

                <!-- Image Preview -->
                <div id="previewContainer" class="flex justify-center">
                    <img id="preview" src="#" alt="Preview" class="rounded-2xl shadow-2xl max-h-64 border-2 border-white/30">
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-gradient w-full text-white font-bold py-4 px-6 rounded-xl text-lg shadow-xl">
                    <span id="btnText">🚀 Analyze Image</span>
                </button>

                <!-- Loading State -->
                <div class="loading text-white font-semibold text-center">
                    <div class="loading-dot"></div>
                    <div class="loading-dot"></div>
                    <div class="loading-dot"></div>
                    <span class="ml-2">Analyzing your image...</span>
                </div>
            </form>
        </div>

        <!-- Footer -->
        <footer class="mt-12 text-center text-white/60 text-sm">
            <p>• Made with <span class="text-red-400">♥</span> for digital truth</p>
            <p class="mt-2 text-xs">© 2025 AutoSplice Research</p>
        </footer>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const uploadForm = document.getElementById('uploadForm');
        const loadingText = document.querySelector('.loading');
        const btnText = document.getElementById('btnText');

        let fileDialogOpen = false;

        // Click to upload
        uploadArea.addEventListener('click', () => {
            if (!fileDialogOpen) {
                fileDialogOpen = true;
                fileInput.click();
            }
        });

        fileInput.addEventListener('change', () => {
            fileDialogOpen = false;
            const file = fileInput.files[0];
            if (file) showPreview(file);
        });

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if(file) {
                fileInput.files = e.dataTransfer.files;
                showPreview(file);
            }
        });

        // Show preview with animation
        function showPreview(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.classList.remove('hidden');
                setTimeout(() => preview.classList.add('show'), 10);
            }
            reader.readAsDataURL(file);
        }

        // Form submission
        uploadForm.addEventListener('submit', (e) => {
            btnText.style.display = 'none';
            loadingText.style.display = 'flex';
        });
    </script>
</body>
</html>
